services:
  lumitrack:
    build:
      context: .
    container_name: lumitrack
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "80:8501"
    environment:
      ESCAPE_ROOM_MONITOR_HOME: /var/data
      LUMITRACK_STREAMLIT_ENTRYPOINT: streamlit_app.py
      PLAYWRIGHT_CHROMIUM_EXECUTABLE: /usr/bin/chromium
      LUMITRACK_CLOUD_SAFE: "0"
      LUMITRACK_MAX_PARALLEL_ORIGINS: "${LUMITRACK_MAX_PARALLEL_ORIGINS:-4}"
      LUMITRACK_NAVIGATION_TIMEOUT_MS: "${LUMITRACK_NAVIGATION_TIMEOUT_MS:-15000}"
      LUMITRACK_DELAY_MIN_SECONDS: "${LUMITRACK_DELAY_MIN_SECONDS:-5}"
      LUMITRACK_DELAY_MAX_SECONDS: "${LUMITRACK_DELAY_MAX_SECONDS:-7}"
    volumes:
      - lumitrack_data:/var/data

volumes:
  lumitrack_data:
