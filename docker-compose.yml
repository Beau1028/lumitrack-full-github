services:
  lumitrack:
    build:
      context: .
    container_name: lumitrack
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "80:8501"
    environment:
      ESCAPE_ROOM_MONITOR_HOME: /var/data
      LUMITRACK_RUNTIME: web
      PLAYWRIGHT_CHROMIUM_EXECUTABLE: /usr/bin/chromium
      LUMITRACK_CLOUD_SAFE: "0"
      LUMITRACK_MAX_PARALLEL_ORIGINS: "${LUMITRACK_MAX_PARALLEL_ORIGINS:-8}"
      LUMITRACK_NAVIGATION_TIMEOUT_MS: "${LUMITRACK_NAVIGATION_TIMEOUT_MS:-10000}"
      LUMITRACK_DELAY_MIN_SECONDS: "${LUMITRACK_DELAY_MIN_SECONDS:-5}"
      LUMITRACK_DELAY_MAX_SECONDS: "${LUMITRACK_DELAY_MAX_SECONDS:-6}"
      LUMITRACK_MINIMUM_RECRAWL_MINUTES: "${LUMITRACK_MINIMUM_RECRAWL_MINUTES:-30}"
      LUMITRACK_RUNNING_CACHE_SECONDS: "${LUMITRACK_RUNNING_CACHE_SECONDS:-45}"
      LUMITRACK_IDLE_CACHE_SECONDS: "${LUMITRACK_IDLE_CACHE_SECONDS:-5}"
      LUMITRACK_AUTOSTART_7DAY: "${LUMITRACK_AUTOSTART_7DAY:-1}"
      LUMITRACK_AUTO_REFRESH_HOURS: "${LUMITRACK_AUTO_REFRESH_HOURS:-2}"
    volumes:
      - lumitrack_data:/var/data

volumes:
  lumitrack_data:
